<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="corazon.ico" type="image/x-icon">
    <title>Links</title>
    <style>
        /* 
            #   = ID
            .   = Class
            :   = Pseudo-Class
            ::  = Pseudo-Element
            >   = Children   
        */
        body {
            font-family: sans-serif;
        }

        a {
            font-weight: bold;
            color: red;
            text-decoration: none;
        }

        a:visited {
            color: rgb(199, 6, 6);
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: rgb(235, 3, 130);
        }

        a:hover::before {
            content: '♣ ';
        }

        a:hover::after {
            content: ' ♠';
        }

        /*
        .especial::before {
            content: '♣ ';
        }

        .especial::after {
            content: ' ♠';
        }
        */
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li class="especial"><a href="https://gustavoguanabara.github.io" target="_blank" rel="external">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank" rel="external">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com." target="_blank" rel="external">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
