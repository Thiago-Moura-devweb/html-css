<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <style>
        .receita {
            background-color: #f6e6cf;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 600px;
            height: 600px;
            margin: 15%;
            padding: 10%;
        }
        h1 {
            text-align: center;
            font-size: 80px;
        }
        h2 {
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="receita">
        <h1>Bolo <br> Amanteigado</h1>
        <img src="bolo-amanteigado-500.png" alt="bolo-amanteigado" width="200px">

        <div class="ingredientes">
            <h2>Ingredientes</h2>
            <ul>
                <li>3 ovos</li>
                <li>2 xícaras(chá)</li>
            </ul>
        </div>
        <div class="preparo">
            <h2>Modo de Preparo</h2>
            <ol>
                <li>Bata os ovos, o açúcar e a <br> manteiga até formar um creme claro e fofo</li>
            </ol>
        </div>
    </div>
</body>
</html>
